<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Page</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>My AI Assistant</h1>
        <p class="intro">Choose your options, then type your request.</p>

        <div class="form-group">
          <label for="tone">Tone</label>
          <select id="tone">
            <option value="friendly">Friendly</option>
            <option value="formal">Formal</option>
            <option value="persuasive">Persuasive</option>
            <option value="funny">Funny</option>
          </select>
        </div>

        <div class="form-group">
          <label for="length">Length</label>
          <select id="length">
            <option value="short">Short</option>
            <option value="medium" selected>Medium</option>
            <option value="long">Long</option>
          </select>
        </div>

        <div class="form-group">
          <label for="format">Format</label>
          <select id="format">
            <option value="paragraph">Paragraph</option>
            <option value="bullet points">Bullet points</option>
            <option value="email">Email</option>
          </select>
        </div>

        <div class="form-group">
          <label for="audience">Audience</label>
          <select id="audience">
            <option value="general audience">General audience</option>
            <option value="beginners">Beginners</option>
            <option value="professionals">Professionals</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prompt">Your request</label>
          <textarea id="prompt" placeholder="Type what you want the AI to do"></textarea>
        </div>

        <button id="send">Send</button>

        <div id="output">The reply will appear here.</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
