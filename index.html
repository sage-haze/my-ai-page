<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
      }

      textarea {
        width: 100%;
        height: 120px;
        font-size: 16px;
        padding: 10px;
        box-sizing: border-box;
      }

      button {
        margin-top: 12px;
        padding: 10px 16px;
        font-size: 16px;
        cursor: pointer;
      }

      #output {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid #ccc;
        min-height: 80px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Ask my AI app</h1>

    <p>Type a message below:</p>

    <textarea id="prompt" placeholder="Write your message here"></textarea>
    <br>
    <button id="send">Send</button>

    <div id="output">The reply will appear here.</div>

    <script>
      const button = document.getElementById("send");
      const promptBox = document.getElementById("prompt");
      const outputBox = document.getElementById("output");
    
      button.addEventListener("click", async function () {
        const message = promptBox.value.trim();
    
        if (!message) {
          outputBox.textContent = "Please type a message first.";
          return;
        }
    
        button.disabled = true;
        outputBox.textContent = "Thinking...";
    
        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: message })
          });
    
          const data = await response.json();
          outputBox.textContent = data.reply;
        } catch (error) {
          outputBox.textContent = "Network error. Please try again.";
        } finally {
          button.disabled = false;
        }
      });
    </script>
    
  </body>
</html>
